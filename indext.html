<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Larice 💗</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TELA 1 -->
<section id="tela1">
    <h1 class="titulo">Larice 💗</h1>
    <p>Uma surpresinha pra você…</p>
    <button class="btn-main" onclick="entrar()">Clique aqui</button>
</section>

<!-- TELA 2 -->
<section id="tela2">

<div class="top-bar">
    <span class="badge">● versão premium</span>
    <span id="dataAtual"></span>
</div>

<div class="container">

    <h1 class="fade">Fiz isso com carinho pra você 💗</h1>

    <!-- FOTO + CONTADOR -->
    <div class="card destaque">
        <img src="foto.jpg">
        <h3 id="contador"></h3>

        <button class="btn musica" onclick="abrirMusica()">
            🎶 Ouvir nossa música
        </button>
    </div>

    <!-- MENSAGEM -->
    <div class="card">
        <h2>Uma mensagem pra você 💌</h2>
        <button class="btn" onclick="mostrarMensagem()">Abrir</button>
        <div id="mensagem"></div>
    </div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
